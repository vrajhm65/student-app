<!DOCTYPE html>
<html>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    *{
      margin: 0;
      padding: 0;
    }
    body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }
    .main{
        display: flex;
        justify-content: center;
        align-items: center;
        width: 80vw;
        height: 80vh;
        background-color: white;
        border-radius: 15px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .heading{
        margin-bottom: 20px;
    } 
    h2 {
        color: #333;
        margin-bottom: 20px;
    }
    input {
        padding: 10px;
        margin: 5px 0;
        width: 200px;
    } 
    button {
        padding: 10px 25px;
        background-color: #007BFF;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 15px;
        transition: background-color 0.3s ease;
        margin-top: 20px;
    }
    button:hover {
        background-color:green;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
      i {
          font-size: 25px;
          color: green;
          margin-bottom: 20px;
          
      }
      .main{
          display: flex;
          justify-content: center;
          align-items: center;
          width: 80vw;
          height: 80vh;
      }
      .input{
          display: flex;
          flex-direction: column;
          justify-content: center;

          align-items: center;
      }
      .table{
          margin-top: 20px;
      }
      .table table {
          border-collapse: collapse;
          width: 100%;
      }
      .table th, .table td {
          border: 1px solid #ddd;
          padding: 8px;
          text-align: center;
      }
      .table th {
          background-color: #f2f2f2;
          color: #333;
      }
      .view{
          margin-top: 20px;
      }
      


    </style>
<head>
  <title>View Attendance</title>
</head>
<body>
<div class="main">
<div class="heading">
<h2>Attendance History</h2>
</div>
<div class="input">
<input type="text" id="usn" placeholder="Enter USN">
<button onclick="loadAttendance()">View</button>
</div>
<div class="table">

<table border="1" id="attendanceTable">
  <tr>
    <th>USN</th>
    <th>Subject</th>
    <th>Date</th>
    <th>Status</th>
  </tr>
</table>
</div>

<h3 id="percentage"></h3>
<select id="subject">
 
</select>
</div>
<script>
fetch("http://localhost:3000/subjects")
.then(res => res.json())
.then(data=>{
  console.log("Subjects:",data);
  const select = document.getElementById("subject");
      select.innerHTML = ""; // clear old options
  data.forEach(sub => {
    select.innerHTML += `
      <option value="${sub.subject_code}">
        ${sub.subject_name}(${sub.subject_code})
      </option>
    `;
  });
});

function loadAttendance() {
  const usn = document.getElementById("usn").value;
  const subject = document.getElementById("subject").value;

  fetch(`http://localhost:3000/attendance/${usn}/${subject}`)
    .then(res => res.json())
    .then(data => {
      const table = document.getElementById("attendanceTable");
      console.log("Data:",data);
      console.log(usn, subject);

      // clear old rows except header
      table.innerHTML = `
        <tr>
          <th>USN</th>
          <th>Subject</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      `;

      let presentCount = 0;

      data.forEach(record => {
        table.innerHTML += `
          <tr>
            <td>${record.usn}</td>
            <td>${record.subject}</td>
            <td>${record.date}</td>
            <td>${record.status}</td>
          </tr>
        `;

        if (record.status === "Present") {
          presentCount++;
        }
      });

      let percentage = 0;
      if (data.length > 0) {
        percentage = (presentCount / data.length) * 100;
      }

      let message ="Attendance: " + percentage.toFixed(2) + "%.\n";
        // Calculate attendance percentage and show message

      if (percentage < 75) {
       message += " Warning: Attendance below 75%!";
      }else {
        message += " Good Attendance, keep up!";
      }
      document.getElementById("percentage").innerText = message;

    });
}
</script>
</body>
</html>
