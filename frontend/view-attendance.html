<!DOCTYPE html>
<html>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    *{
      margin:0;
      padding:0;
    }
    body{
      font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
      background-color:#eef2f7;
      
    }
    .container{
      display:flex;
      margin: 40px auto;
      max-width: 1100px;
      gap:20px;
    }
  
    .card-left{
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      flex:2;
      

    }
    .card-right{
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      flex:1;
      height:fit-content;
    }
    h2{
      text-align: center ;
      margin-bottom: 20px;
    }
    .controls{
      display:flex;
      gap:10px;
      margin-bottom: 20px;

    }
    input, select{
      padding:10px;
      border-radius: 6px;
      border:1px solid #ccc;
      flex:1;
    }
    button{
      padding:10px 20px;
      border:none;
      border-radius: 6px;
      background: #4caf50;
      color:white;
      cursor: pointer;
    }
    button:hover{
      background: #4ca049;
    }
    table{
      width:100%;
      border-collapse: collapse;
    }
    th{
      background: #2c7be5;
      color:white;
      padding:10px;
      border:1px solid #ddd;
    }
    td{
      padding:10px;
      border:1px solid #ddd;
      text-align: center;
    }
    tr:hover{
      background: #f5f5f5;
    }
    .back{
      margin-bottom: 10px;
      background: #6c757d;
    }
  </style>
<head>
  <title>View Attendance</title>
</head>
<body>
<div class="container">
<div class="card-left">

<button  onclick="window.location.href = 'index.html'"><i class="fas fa-arrow-left"></i> Back</button>
<h2>Attendance History</h2>

<div class="controls">
<input type="text" id="usn" placeholder="Enter USN">

<select id="subject"></select>

<button onclick="loadAttendance()">View</button>
</div>
<table border="1" id="attendanceTable">
  <tr>
    <th>USN</th>
    <th>Subject</th>
    <th>Date</th>
    <th>Status</th>
  </tr>
</table>
</div>

<div class="card-right">

<h3 id="percentage"> Student Status</h3>
</div>
</div>
<script>
fetch("http://localhost:3000/subjects")
.then(res => res.json())
.then(data=>{
  console.log("Subjects:",data);
  const select = document.getElementById("subject");
      select.innerHTML = ""; // clear old options
  data.forEach(sub => {
    select.innerHTML += `
      <option value="${sub.subject_code}">
        ${sub.subject_name}(${sub.subject_code})
      </option>
    `;
  });
});

function loadAttendance() {
  const usn = document.getElementById("usn").value;
  const subject = document.getElementById("subject").value;

  fetch(`http://localhost:3000/attendance/${usn}/${subject}`)
    .then(res => res.json())
    .then(data => {
      const table = document.getElementById("attendanceTable");
      console.log("Data:",data);
      console.log(usn, subject);

      // clear old rows except header
      table.innerHTML = `
        <tr>
          <th>USN</th>
          <th>Subject</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      `;

      let presentCount = 0;

      data.forEach(record => {
        table.innerHTML += `
          <tr>
            <td>${record.usn}</td>
            <td>${record.subject}</td>
            <td>${record.date}</td>
            <td>${record.status}</td>
          </tr>
        `;

        if (record.status === "Present") {
          presentCount++;
        }
      });

      let percentage = 0;
      if (data.length > 0) {
        percentage = (presentCount / data.length) * 100;
      }

      let message ="Attendance: " + percentage.toFixed(2) + "%.\n";
        // Calculate attendance percentage and show message

      if (percentage < 75) {
       message += " Warning: Attendance below 75%!";
      }else {
        message += " Good Attendance, keep up!";
      }
      document.getElementById("percentage").innerText = message;

    });
}

</script>
</body>
</html>
