<!DOCTYPE html>
<html>
<head>
  <title>View Attendance</title>
</head>
<body>

<h2>Attendance History</h2>

<input type="text" id="usn" placeholder="Enter USN">
<button onclick="loadAttendance()">View</button>

<table border="1" id="attendanceTable">
  <tr>
    <th>USN</th>
    <th>Subject</th>
    <th>Date</th>
    <th>Status</th>
  </tr>
</table>

<h3 id="percentage"></h3>
<select id="subject">
 
</select>

<script>
fetch("http://localhost:3000/subjects")
.then(res => res.json())
.then(data=>{
  console.log("Subjects:",data);
  const select = document.getElementById("subject");
      select.innerHTML = ""; // clear old options
  data.forEach(sub => {
    select.innerHTML += `
      <option value="${sub.subject_code}">
        ${sub.subject_name}(${sub.subject_code})
      </option>
    `;
  });
});

function loadAttendance() {
  const usn = document.getElementById("usn").value;
  const subject = document.getElementById("subject").value;

  fetch(`http://localhost:3000/attendance/${usn}/${subject}`)
    .then(res => res.json())
    .then(data => {
      const table = document.getElementById("attendanceTable");
      console.log("Data:",data);
      console.log(usn, subject);

      // clear old rows except header
      table.innerHTML = `
        <tr>
          <th>USN</th>
          <th>Subject</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      `;

      let presentCount = 0;

      data.forEach(record => {
        table.innerHTML += `
          <tr>
            <td>${record.usn}</td>
            <td>${record.subject}</td>
            <td>${record.date}</td>
            <td>${record.status}</td>
          </tr>
        `;

        if (record.status === "Present") {
          presentCount++;
        }
      });

      let percentage = 0;
      if (data.length > 0) {
        percentage = (presentCount / data.length) * 100;
      }

      let message ="Attendance: " + percentage.toFixed(2) + "%.\n";
        // Calculate attendance percentage and show message

      if (percentage < 75) {
       message += " Warning: Attendance below 75%!";
      }else {
        message += " Good Attendance, keep up!";
      }
      document.getElementById("percentage").innerText = message;

    });
}
</script>
</body>
</html>
