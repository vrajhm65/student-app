        }
        .left{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 40vw;
            height: 80vh;
            left: 10vw;
            top: 10vh;
            background-color: #f0f0f0;
            flex-direction: column;
            position: absolute;
            border-top-left-radius: 15px;
            border-bottom-left-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }
         input {
            padding: 10px;
            margin: 5px 0;
            width: 200px;
        }
        h1{
            color: #333;
            margin-bottom: 10px;
            margin-top: 20px;
        }

        .left h2{
            color:black;
            margin-bottom: 20px;
            font-size: 24px;

            font-family: 'Arial', sans-serif;
        }

      input {
            padding: 10px;
            margin: 5px 0;

        }
        select {
            padding: 10px;
            margin: 5px 0;
            width: 220px;
            
        }

        .left button {
            padding: 10px 25px;
            background-color:green;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 15px;
            transition: background-color 0.3s ease;
            margin-top: 20px;
          }
        .left button:hover {
            background-color:rgb(2, 110, 2) ;
            
        }
          i {
              font-size: 25px;
              color: green;
              margin-bottom: 20px;
          }
          .right h3{
              color: #333;
              margin-bottom: 20px;
              font-size: 24px;
              font-weight: bold;
              font-family: 'Arial', sans-serif;
          }
          .right button {
            padding: 8px 25px;
            background-color:red;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 15px;
            transition: background-color 0.3s ease;
            margin-top: 20px;
            margin-left: 20px;

        .right button:hover {

        .left .back button{
        position: absolute;
        top: 20px;

</head>
<body>
  <div class="left">
    <div class="back">
      <button onclick="window.location.href = 'index.html'"> <i class="fas fa-arrow-left"></i> </button>
    </div>
    <h2>Manage Subjects <i class="fas fa-book"></i></h2>

<input type="text" id="name" placeholder="Subject Name">
<input type="text" id="code" placeholder="Subject Code">
<button onclick="addSubject()">Add Subject</button>
</div>


<div class="right">
<h3>Subject List <i class="fa-solid fa-clipboard-list"></i></h3>
<div id="subjectList"></div>
</div>
<script>

//Load subjects
function loadSubjects() {
  fetch("http://localhost:3000/subjects")
    .then(res => res.json())
    .then(data => {
      const div = document.getElementById("subjectList");
      div.innerHTML = "";

      data.forEach(sub => {
        div.innerHTML += `
          <p>
            ${sub.subject_name} (${sub.subject_code})
            <button onclick="deleteSubject(${sub.id})">Delete</button>
          </p>
        `;
      });
    });
}

//Add subject
function addSubject() {
  const subject_name = document.getElementById("name").value;
  const subject_code = document.getElementById("code").value;

  fetch("http://localhost:3000/add-subject", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ subject_name, subject_code })
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);
    loadSubjects(); // refresh
  });
}

// 🔹 Delete subject
function deleteSubject(id) {
  fetch(`http://localhost:3000/delete-subject/${id}`, {
    method: "DELETE"
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);
    loadSubjects(); // refresh
  });
}

//loads subjects on page load
loadSubjects();

</script>
    
</body>
