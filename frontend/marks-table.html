<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>marks-table</title>
    <style> 
    /* card layout css styling*/
        *{
          margin: 0;
          padding: 0;
        }
        body {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
         input {
            padding: 10px;
            margin: 5px 0;
            width: 80px;
        }
        h2{
            color: #333;
            margin-bottom: 20px;
        }
          table {
              border-collapse: collapse;
              width: 80%;
              margin-bottom: 20px;
              border: 1px solid #ddd;
              border-radius: 10px;
              border-color: #333;

          }
          th, td {
              border: 1px solid #ddd;
              padding: 8px;
              text-align: center;
              border-color: #333;
          }
          th {
              background-color: #f2f2f2;
              color: #333;
              border-color: #333;

          }
            button {
                padding: 10px 20px;
                background-color: #4CAF50;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }
            button:hover {
                background-color: #45a049;
            }
            .container {
                display: flex;
                flex-direction: column;
                align-items: center;
                height: 80vh;
                justify-content: center;
                width: 80vw;
                background-color: rgb(176, 196, 222 , 50%);
                border-radius: 15px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
                
            }
            i {
                color: #333;
                margin-left: 10px;
                color:green;
            }
            


    </style>
</head>
<body>
  <div class="container">
    <h2>Marks Entry System <i class="fas fa-edit"></i></h2>

<table border="1" id="marksTable"></table>

<br>
<button onclick="submitMarks()">Submit All</button>
</div>
<script>
    const access = localStorage.getItem("faculty");

if (access !== "true") {
  alert("Please login as faculty first ❌");
  window.location.href = "faculty.html";
}

let students = [];
let subjects = [];

// 🔥 Load data
fetch("http://localhost:3000/marks-data")
.then(res => res.json())
.then(data => {
  students = data.students;
  subjects = data.subjects;

  createTable();
});

// 🔥 Create table
function createTable() {
  const table = document.getElementById("marksTable");

  // Header
  let header = "<tr><th>Name</th><th>USN</th>";

  subjects.forEach(sub => {
    header += `<th>${sub.subject_code}</th>`;
  });

  header += "</tr>";

  table.innerHTML = header;

  // Rows
  students.forEach(stu => {
    let row = `<tr>
      <td>${stu.name}</td>
      <td>${stu.usn}</td>
    `;

    subjects.forEach(sub => {
      row += `
        <td>
          <input type="number" 
            id="${stu.usn}_${sub.subject_code}" 
            placeholder="Marks" >
        </td>
      `;
    });

    row += "</tr>";
    table.innerHTML += row;
  });
}

// 🔥 Submit all marks
function submitMarks() {
  const data = [];

  students.forEach(stu => {
    subjects.forEach(sub => {

      const value = document.getElementById(`${stu.usn}_${sub.subject_code}`).value;

      if (value) {
        data.push({
          usn: stu.usn,
          subject: sub.subject_code,
          marks: value
        });
      }

    });
  });

  fetch("http://localhost:3000/save-marks", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ data })
  })
  .then(res => res.json())
  .then(data => alert(data.message));
}

</script>
</body>
</html>
